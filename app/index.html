<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelador OPM</title>
    <style>
      /*
       * Ronda 28 L1 — Paleta Bauhaus monocromatica (CSS variables fundacionales).
       *
       * Estas variables :root son el SSOT cromatico del chrome UI a partir
       * de ronda 28. Los componentes pueden leerlas con var(--ink),
       * var(--paper), etc. o seguir consumiendo tokens.colors.* (que apunta
       * al mismo conjunto via compat-shim).
       *
       * Paleta:
       *   ink/paper + escala monocromatica ink-90..ink-04 +
       *   accent cinabrio + accentDark + focus ultramar + warning terracota.
       *
       * Tipografia chrome: Inter Tight variable self-hosted (importada via
       * @fontsource-variable en src/main.tsx). tabular-nums para evitar
       * desalineos en grids de numeros. letter-spacing -0.01em para densidad
       * Bauhaus. JetBrains Mono variable como fallback de code/kbd/.mono.
       */
      :root {
        /* Achromatic base */
        --ink: #0A0A0A;
        --ink-02: #050505;
        --paper: #FAFAFA;
        --paper-02: #F5F5F5;
        --paper-04: #F0F0F0;
        --ink-90: #1A1A1A;
        --ink-70: #404040;
        --ink-50: #6E6E6E;
        --ink-30: #A8A8A8;
        --ink-15: #D2D2D2;
        --ink-08: #E8E8E8;
        --ink-04: #F2F2F2;

        /* Triada primaria Bauhaus (Itten/Klee/Kandinsky)
           Refinamiento 2026-05-23: rojo + azul + amarillo completos. */
        --accent: #C8392F;       /* cinabrio — seleccion, accion primaria, danger */
        --accent-soft: #F5DDDB;
        --accent-dark: #9F2519;
        --focus: #1F3FA6;        /* ultramar — focus-visible, info, enlaces */
        --focus-soft: #E3E7F4;
        --focus-dark: #152A75;
        --ocre: #C89033;         /* saffron Klee — warning, atencion, en curso */
        --ocre-soft: #F4E9C8;
        --ocre-dark: #5E4310;

        /* Secundarios disciplinados */
        --bosque: #2D6B47;       /* verde Bauhaus — success, valido, completado */
        --bosque-soft: #D6E5DC;
        --bosque-dark: #1F4A30;
        --terracota: #8A3D2D;    /* destructive secundario distinto de cinabrio */
        --terracota-soft: #E8DBD3;
        --terracota-dark: #6B2C20;

        /* Aliases semánticos */
        --warning: var(--ocre);
        --warning-soft: var(--ocre-soft);
        --warning-dark: var(--ocre-dark);
        --success: var(--bosque);
        --success-soft: var(--bosque-soft);
        --success-dark: var(--bosque-dark);
        --destructive: var(--terracota);
      }

      *, *::before, *::after { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; }

      html {
        font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
        background: var(--paper);
        color: var(--ink);
      }

      body {
        font-family: inherit;
        background: var(--paper);
        color: var(--ink);
        overflow: hidden;
      }

      button, input, select, textarea {
        font: inherit;
        font-variant-numeric: inherit;
        letter-spacing: inherit;
      }

      code, kbd, samp, .mono, [class*="mono"] {
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-variant-numeric: normal;
        letter-spacing: 0;
      }

      /*
       * Utility class Bauhaus: labels en mayuscula con tracking abierto y
       * peso medium. Usable por L2/L3/L5/L6 en headings de secciones,
       * categorias OPL, etiquetas de toolbar, etc.
       */
      .opm-label-uppercase {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 500;
      }

      /*
       * Refinamiento 2026-05-23 — focus ring Bauhaus refinado.
       *
       * 2px ultramar + 1px paper offset (sin glow, sin transition cromatica).
       * Reemplaza el outline default del browser por el ring canonico que
       * preserva contraste sobre cualquier superficie (paper/paper-02/paper-04/
       * ink-04). Los componentes que necesiten focus distinto pueden
       * sobreescribir con :focus-visible specific.
       */
      :focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 1px;
      }
      :focus:not(:focus-visible) {
        outline: none;
      }

      /*
       * Refinamiento 2026-05-23 — utility classes para axis tipografico explicito.
       * Usables por componentes que quieran declarar peso explicito sin pasar
       * por tokens.weights.* (util para syntax highlight de OPL).
       */
      .opm-weight-light { font-weight: 300; }
      .opm-weight-normal { font-weight: 400; }
      .opm-weight-medium { font-weight: 500; }
      .opm-weight-bold { font-weight: 700; }
      .opm-weight-display { font-weight: 900; }

      /* Hairlines disciplinados Bauhaus */
      .opm-hairline { border-color: var(--ink-08); border-style: solid; border-width: 1px; }
      .opm-chrome-line { border-color: var(--ink-15); border-style: solid; border-width: 1px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
