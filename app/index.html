<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelador OPM</title>
    <style>
      /*
       * Ronda 28 L1 — Paleta Bauhaus monocromatica (CSS variables fundacionales).
       *
       * Estas variables :root son el SSOT cromatico del chrome UI a partir
       * de ronda 28. Los componentes pueden leerlas con var(--ink),
       * var(--paper), etc. o seguir consumiendo tokens.colors.* (que apunta
       * al mismo conjunto via compat-shim).
       *
       * Paleta:
       *   ink/paper + escala monocromatica ink-90..ink-04 +
       *   accent cinabrio + accentDark + focus ultramar + warning terracota.
       *
       * Tipografia chrome: Inter Tight variable self-hosted (importada via
       * @fontsource-variable en src/main.tsx). tabular-nums para evitar
       * desalineos en grids de numeros. letter-spacing -0.01em para densidad
       * Bauhaus. JetBrains Mono variable como fallback de code/kbd/.mono.
       */
      :root {
        --ink: #0A0A0A;
        --paper: #FAFAFA;
        --ink-90: #1A1A1A;
        --ink-70: #404040;
        --ink-50: #6E6E6E;
        --ink-30: #A8A8A8;
        --ink-15: #D2D2D2;
        --ink-08: #E8E8E8;
        --ink-04: #F2F2F2;
        --accent: #C8392F;
        --accent-soft: #F5DDDB;
        --accent-dark: #9F2519;
        --focus: #1F3FA6;
        --focus-soft: #E3E7F4;
        --warning: #8A3D2D;
      }

      *, *::before, *::after { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; }

      html {
        font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
        background: var(--paper);
        color: var(--ink);
      }

      body {
        font-family: inherit;
        background: var(--paper);
        color: var(--ink);
        overflow: hidden;
      }

      button, input, select, textarea {
        font: inherit;
        font-variant-numeric: inherit;
        letter-spacing: inherit;
      }

      code, kbd, samp, .mono, [class*="mono"] {
        font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-variant-numeric: normal;
        letter-spacing: 0;
      }

      /*
       * Utility class Bauhaus: labels en mayuscula con tracking abierto y
       * peso medium. Usable por L2/L3/L5/L6 en headings de secciones,
       * categorias OPL, etiquetas de toolbar, etc.
       */
      .opm-label-uppercase {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
