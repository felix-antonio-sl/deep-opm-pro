<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelador OPM</title>
    <style>
      /*
       * Ronda Codex L1 — variables fundacionales del chrome editorial.
       *
       * tokens.ts es el contrato principal. Este bloque existe para CSS
       * historico que aun lee var(--ink), var(--paper), etc.; los aliases
       * quedan reexpresados como papel/tinta/crimson Codex.
       */
      :root {
        /* Codex base */
        --ink: #171511;
        --ink-02: #171511;
        --paper: #fafaf8;
        --paper-02: #f4f3ec;
        --paper-04: #f4f3ec;
        --ink-90: #171511;
        --ink-70: #5a564c;
        --ink-50: #a39e92;
        --ink-30: #cfcbc1;
        --ink-15: #e4e0d6;
        --ink-08: #e4e0d6;
        --ink-04: #f4f3ec;

        /* Crimson editorial UI-only (seleccion, foco, alertas). */
        --accent: #8e2a2e;
        --accent-soft: #f4f3ec;
        --accent-dark: #8e2a2e;
        --focus: #8e2a2e;
        --focus-soft: #f4f3ec;
        --focus-dark: #8e2a2e;
        --ocre: #8e2a2e;
        --ocre-soft: #f4f3ec;
        --ocre-dark: #8e2a2e;

        /* Canon OPM disponible para UI secundaria, no para semantica chrome. */
        --bosque: #3a6b4d;
        --bosque-soft: #f4f3ec;
        --bosque-dark: #3a6b4d;
        --terracota: #8e2a2e;
        --terracota-soft: #f4f3ec;
        --terracota-dark: #8e2a2e;

        /* Aliases semánticos */
        --warning: var(--ocre);
        --warning-soft: var(--ocre-soft);
        --warning-dark: var(--ocre-dark);
        --success: var(--bosque);
        --success-soft: var(--bosque-soft);
        --success-dark: var(--bosque-dark);
        --destructive: var(--terracota);
      }

      *, *::before, *::after { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; }

      html {
        font-family: "Inria Serif", Georgia, serif;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
        background: var(--paper);
        color: var(--ink);
        /*
         * El swipe-back de macOS/Chrome se gobierna en el scroller raiz, no en
         * scrollers anidados: el `overscroll-behavior: contain` del canvas
         * (JointCanvas style.viewport) no lo previene. Desactivamos la affordance
         * de navegacion por overscroll en el raiz. body es overflow:hidden, asi
         * que esto solo bloquea el gesto historico; los scrolls internos (canvas,
         * paneles) conservan el suyo.
         */
        overscroll-behavior-x: none;
      }

      body {
        font-family: inherit;
        background: var(--paper);
        color: var(--ink);
        overflow: hidden;
        overscroll-behavior-x: none;
      }

      button, input, select, textarea {
        font: inherit;
        font-variant-numeric: inherit;
        letter-spacing: inherit;
      }

      code, kbd, samp, .mono, [class*="mono"] {
        font-family: "JetBrains Mono Variable", "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-variant-numeric: normal;
        letter-spacing: 0;
      }

      /*
       * Utility class Codex: labels en mayuscula con tracking abierto.
       */
      .opm-label-uppercase {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
      }

      /*
       * Focus ring Codex: crimson editorial, sin glow.
       */
      :focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 1px;
      }
      :focus:not(:focus-visible) {
        outline: none;
      }

      /*
       * Utility classes para pesos disponibles en Inria self-hosted.
       */
      .opm-weight-light { font-weight: 300; }
      .opm-weight-normal { font-weight: 400; }
      .opm-weight-medium { font-weight: 500; }
      .opm-weight-semibold { font-weight: 600; }
      .opm-weight-bold { font-weight: 700; }
      .opm-weight-display { font-weight: 700; }

      /* Hairlines disciplinados Codex */
      .opm-hairline { border-color: var(--ink-08); border-style: solid; border-width: 1px; }
      .opm-chrome-line { border-color: var(--ink-15); border-style: solid; border-width: 1px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
