<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>Codex · 01 Editor principal — OpForja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1815; overflow: hidden; height: 100vh; }
    body { display: flex; align-items: center; justify-content: center; }
    .frame {
      width: 1700px; height: 950px;
      background: #fafaf8;
      transform-origin: center center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    * { box-sizing: border-box; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script>
    window.__fit = function() {
      var f = document.querySelector('.frame');
      if (!f) return;
      var sw = window.innerWidth / 1700;
      var sh = window.innerHeight / 950;
      var s = Math.min(sw, sh, 1);
      f.style.transform = 'scale(' + s + ')';
    };
    window.addEventListener('resize', window.__fit);
    document.addEventListener('DOMContentLoaded', window.__fit);
    setInterval(window.__fit, 250);
  </script>
</head>
<body>
  <div class="frame" id="root"></div>
  <script type="text/babel" src="../src/variant-codex.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<CodexEditor/>);
    setTimeout(function() { window.__fit && window.__fit(); }, 100);
  </script>
</body>
</html>
