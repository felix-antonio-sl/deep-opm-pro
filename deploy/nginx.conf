# ── Rate limiting (blindaje 2026-06-06, auditoría persistencia crítico #4) ──
# Este conf vive en conf.d/ (contexto http). nginx corre DETRÁS de Traefik en la
# red interna: la IP real del cliente viaja en X-Forwarded-For (primer hop); el
# header no es spoofeable hacia dentro porque solo Traefik alcanza este nginx.
map $http_x_forwarded_for $opforja_client_ip {
  default                 $binary_remote_addr;
  "~^(?<ip>[^,\s]+)"      $ip;
}
# API de persistencia (lecturas + autosaves): generosa para uso real.
limit_req_zone $opforja_client_ip zone=opforja_api:10m   rate=10r/s;
# Creación de sesión/tenant (vector de tenants infinitos) y bug-reports
# (escriben a disco del repo): estrictas.
limit_req_zone $opforja_client_ip zone=opforja_sesion:10m rate=2r/s;
limit_req_zone $opforja_client_ip zone=opforja_bugs:10m   rate=1r/s;
limit_req_status 429;

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  gzip on;
  gzip_types
    application/javascript
    application/json
    image/svg+xml
    text/css
    text/plain;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /healthz {
    access_log off;
    add_header Content-Type "text/plain; charset=utf-8";
    return 200 "ok\n";
  }

  location = /__deep-opm/bug-reports {
    limit_req zone=opforja_bugs burst=5 nodelay;
    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://bug-capture:3000;
  }

  location /__deep-opm/modelos {
    limit_req zone=opforja_api burst=25 nodelay;
    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://model-api:3001;
  }

  location /__deep-opm/workspace {
    limit_req zone=opforja_api burst=25 nodelay;
    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://model-api:3001;
  }

  location /__deep-opm/session {
    limit_req zone=opforja_sesion burst=10 nodelay;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://model-api:3001;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }
}
